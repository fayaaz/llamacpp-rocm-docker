# =========================
# Qwen-3.5-27B (Fixed for 16GB VRAM)
# =========================
[qwen-3.5-27b]
model = /models/Qwen_Qwen3.5-27B-IQ3_M.gguf
ctx-size = 40072

# CRITICAL: Force 1 slot so you get the full context for ONE request
parallel = 1

# ROCm Optimization
split-mode = none
main-gpu = 0
kv-unified = false
flash-attn = true
jinja = true

# Cache compression
cache-type-k = q4_0
cache-type-v = q4_0

# RDNA 4 Throughput Fix
# 2048 is fine for batch, but ubatch MUST be 64 for 9070 XT speed
batch-size = 2048
ubatch-size = 64
threads = 16

# Sampling
temperature = 0.4
min-p = 0.05
repeat-penalty = 1.02
no-warmup = true

# =========================
# Qwen-3.5-27B (64k context)
# =========================
[qwen-3.5-27b-64k]
model = /models/Qwen_Qwen3.5-27B-IQ3_M.gguf
ctx-size = 65536

n-gpu-layers = 58
parallel = 1

flash-attn = true
jinja = true
split-mode = none
no-mmap = true

cache-type-k = q4_0
cache-type-v = q4_0

batch-size = 2048
ubatch-size = 64
threads = 32

temperature = 0.4
min-p = 0.05
repeat-penalty = 1.02
no-warmup = true

# =========================
# Gemma-4-31B (Long-running, CPU offload)
# =========================
[gemma-4-31b]
model = /models/google_gemma-4-31B-it-Q6_K.gguf
ctx-size = 65536

# ~30 layers on GPU (85% VRAM used with 28, headroom for 2 more)
# Leaves ~2GB for compute buffers
n-gpu-layers = 29
split-mode = none

# ROCm Optimization
flash-attn = true
jinja = true

# Cache for large context
batch-size = 2048
ubatch-size = 64
threads = 16
cache-type-k = q4_0
cache-type-v = q4_0

# Sampling (reasoning/coding)
temperature = 0.3
top-k = 30
top-p = 0.9
min-p = 0.1
repeat-penalty = 1.05
no-warmup = true
parallel = 1

