# =========================
# Gemma-4-26B (Primary)
# =========================
[gemma-4-26b]
model = /models/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf

# Core performance
ctx-size = 32768
n-gpu-layers = 90
split-mode = none

# KV cache (balanced)
cache-type-k = q4_0
cache-type-v = q4_0

# Runtime
batch-size = 2048
ubatch-size = 512
threads = 16

# Sampling defaults (reasoning/coding)
temperature = 0.3
top-k = 30
top-p = 0.9
min-p = 0.1

# Misc
no-warmup = true



# =========================
# Gemma-4-26B (High Quality KV)
# =========================
[gemma-4-26b-hq]
model = /models/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf

ctx-size = 32768
n-gpu-layers = 90
split-mode = none

# Higher quality KV cache
cache-type-k = q4_0
cache-type-v = q5_0

temperature = 0.3
top-k = 30
top-p = 0.9
min-p = 0.1



# =========================
# Gemma-4-26B (Large Context)
# =========================
[gemma-4-26b-64k]
model = /models/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf

ctx-size = 65536
n-gpu-layers = 90
split-mode = none

cache-type-k = q4_0
cache-type-v = q4_0

