# =========================
# Gemma-4-26B (Primary)
# =========================
[gemma-4-26b]
model = /models/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf

# Core performance
ctx-size = 32768
n-gpu-layers = 99
split-mode = none

# Better performance on RDNA
flash-attn = true

# Avoid the looping on RDNA
jinja = true

# KV cache (balanced)
cache-type-k = q4_0
cache-type-v = q4_0

# Runtime
batch-size = 2048
ubatch-size = 128
threads = 16

# Sampling defaults (reasoning/coding)
temperature = 0.3
top-k = 30
top-p = 0.9
min-p = 0.1

# Misc
no-warmup = true
repeat-penalty = 1.05
parallel = 1


