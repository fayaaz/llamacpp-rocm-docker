# =========================
# Qwen-3.5-27B (Fixed for 16GB VRAM)
# =========================
[qwen-3.5-27b]
model = /models/Qwen_Qwen3.5-27B-IQ3_M.gguf
ctx-size = 42072

# CRITICAL: Force 1 slot so you get the full context for ONE request
parallel = 1

# ROCm Optimization
split-mode = none
main-gpu = 0
kv-unified = false
flash-attn = true
jinja = true

# Cache compression
cache-type-k = q4_0
cache-type-v = q4_0

# RDNA 4 Throughput Fix
# 2048 is fine for batch, but ubatch MUST be 64 for 9070 XT speed
batch-size = 2048
ubatch-size = 64
threads = 16

# Sampling
temperature = 0.4
min-p = 0.05
repeat-penalty = 1.02
no-warmup = true
